<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computech CEC — Student Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#14203d; --ink-2:#223a5e;
  --accent:#e0a13a; --accent-soft:#fbeecd;
  --accent-2:#1fa596;
  --bg:#f4f6fb; --surface:#ffffff; --surface-2:#fafbfe;
  --line:#e5e9f2; --line-2:#eef1f7;
  --text:#182036; --muted:#647089; --muted-2:#8a94ab;
  --good:#22a06b; --good-soft:#e2f4ec;
  --bad:#d64545; --bad-soft:#fae6e6;
  --radius:16px; --radius-sm:10px;
  --shadow:0 1px 3px rgba(20,32,61,.06), 0 8px 24px rgba(20,32,61,.06);
  --shadow-lg:0 12px 40px rgba(20,32,61,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4,.brand-name{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- LOGIN ---------- */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1200px 600px at 80% -10%,rgba(224,161,58,.10),transparent 60%),
             radial-gradient(900px 500px at -10% 110%,rgba(31,165,150,.10),transparent 55%),
             var(--ink);}
.auth-card{width:100%;max-width:410px;background:var(--surface);border-radius:22px;
  box-shadow:var(--shadow-lg);overflow:hidden}
.auth-head{padding:30px 30px 22px;border-bottom:1px solid var(--line-2)}
.logo-row{display:flex;align-items:center;gap:11px;margin-bottom:20px}
.logo-mark{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none;
  background:linear-gradient(135deg,var(--ink) 0%,var(--ink-2) 100%);position:relative}
.logo-mark span{font-family:'Space Grotesk';font-weight:700;color:#fff;font-size:19px;line-height:1}
.logo-mark::after{content:"";position:absolute;right:-3px;bottom:-3px;width:14px;height:14px;
  border-radius:5px;background:var(--accent);border:2.5px solid var(--surface)}
.brand-name{font-size:16px;font-weight:700;color:var(--ink)}
.brand-sub{font-size:11px;color:var(--muted-2);letter-spacing:.03em;text-transform:uppercase;font-weight:500}
.auth-head h1{font-size:22px;color:var(--ink);margin-bottom:5px}
.auth-head p{font-size:13.5px;color:var(--muted)}
.auth-body{padding:24px 30px 30px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:7px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  font-size:15px;font-family:inherit;background:var(--surface-2);transition:border-color .15s,background .15s}
.field input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.field input::placeholder{color:var(--muted-2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;
  font-size:14.5px;padding:12px 18px;border-radius:var(--radius-sm);transition:transform .08s,box-shadow .15s,background .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--accent);color:#3a2a05;width:100%;box-shadow:0 2px 0 #c58a26}
.btn-primary:hover{background:#e6ab4a}
.btn-ghost{background:transparent;color:var(--ink-2);border:1.5px solid var(--line)}
.btn-ghost:hover{border-color:var(--muted-2)}
.auth-msg{font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:16px;display:none}
.auth-msg.show{display:block}
.auth-msg.err{background:var(--bad-soft);color:#a13333}
.auth-foot{margin-top:18px;padding-top:18px;border-top:1px solid var(--line-2);text-align:center}
.auth-foot button{font-size:13px;color:var(--accent-2);font-weight:600}
.auth-foot button:hover{text-decoration:underline}
.demo-hint{margin-top:14px;font-size:11.5px;color:var(--muted-2);text-align:center;line-height:1.6}
.demo-hint code{background:var(--surface-2);border:1px solid var(--line);padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono';font-size:11px;color:var(--ink-2)}

/* ---------- APP SHELL ---------- */
.app{display:none;min-height:100vh}
.app.show{display:grid;grid-template-columns:248px 1fr}
.sidebar{background:var(--ink);color:#cdd6ea;padding:22px 16px;display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh}
.sidebar .logo-row{margin-bottom:26px;padding:0 6px}
.sidebar .brand-name{color:#fff}
.sidebar .brand-sub{color:#7d89a8}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
  font-size:14px;font-weight:500;color:#aab6d1;transition:background .15s,color .15s;text-align:left;width:100%}
.nav-item svg{width:19px;height:19px;flex:none;stroke-width:1.9}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--accent);color:#3a2a05;font-weight:600}
.nav-item.active svg{stroke:#3a2a05}
.side-foot{padding:12px 6px 0;border-top:1px solid rgba(255,255,255,.08);margin-top:8px}
.side-user{display:flex;align-items:center;gap:10px;padding:6px 6px 12px}
.avatar{width:36px;height:36px;border-radius:10px;background:var(--ink-2);color:#fff;display:grid;
  place-items:center;font-weight:600;font-size:14px;flex:none;font-family:'Space Grotesk'}
.side-user .nm{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.side-user .bt{font-size:11px;color:#7d89a8}
.logout{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border-radius:10px;
  font-size:13px;color:#9aa6c4;font-weight:500}
.logout:hover{background:rgba(214,69,69,.14);color:#ff9d9d}
.logout svg{width:17px;height:17px}

/* main */
.main{padding:26px 30px 40px;max-width:1080px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px}
.topbar h1{font-size:24px;color:var(--ink)}
.topbar .sub{font-size:13.5px;color:var(--muted);margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;
  border-radius:20px;background:var(--accent-soft);color:#8a6410}
.pill.live{background:var(--good-soft);color:#1a7a4f}
.pill.live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--good);
  animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.tab-panel{display:none;animation:fade .25s ease}
.tab-panel.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px}
.card + .card{margin-top:16px}
.grid{display:grid;gap:16px}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}

/* home stats */
.stat{padding:18px 20px}
.stat .k{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  display:flex;align-items:center;gap:8px}
.stat .k svg{width:15px;height:15px;color:var(--accent-2)}
.stat .v{font-family:'Space Grotesk';font-size:28px;font-weight:700;color:var(--ink);margin-top:8px;line-height:1}
.stat .v small{font-size:14px;color:var(--muted-2);font-weight:500}
.progress-track{height:8px;background:var(--line-2);border-radius:20px;overflow:hidden;margin-top:14px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-2),#38c9b8);border-radius:20px;transition:width .8s ease}

.section-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;
  align-items:center;justify-content:space-between}
.section-title span{font-size:12px;font-weight:600;color:var(--accent-2)}

/* announcements */
.ann{display:flex;gap:13px;padding:14px 0;border-bottom:1px solid var(--line-2)}
.ann:last-child{border-bottom:none;padding-bottom:0}
.ann-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-top:6px;flex:none}
.ann-body h4{font-size:14px;color:var(--ink);margin-bottom:3px}
.ann-body p{font-size:13px;color:var(--muted)}
.ann-body .t{font-size:11.5px;color:var(--muted-2);margin-top:4px}

/* next class */
.next-class{background:linear-gradient(120deg,var(--ink) 0%,var(--ink-2) 100%);color:#fff;
  border:none;position:relative;overflow:hidden}
.next-class::before{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;
  border-radius:50%;background:radial-gradient(circle,rgba(224,161,58,.35),transparent 70%)}
.next-class .lbl{font-size:12px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.next-class h3{font-size:19px;margin:8px 0 4px;color:#fff}
.next-class .when{font-size:13.5px;color:#b9c3dc}
.next-class .btn{margin-top:16px;width:auto;position:relative}

/* welcome banner */
.welcome-banner{display:flex;align-items:center;gap:16px;margin-bottom:16px;
  background:linear-gradient(120deg,var(--accent-soft) 0%,#fff7e8 100%);
  border:1px solid #f0dcae}
.wb-icon{width:46px;height:46px;border-radius:12px;background:#fff;display:grid;place-items:center;
  font-size:22px;flex:none;box-shadow:0 2px 8px rgba(224,161,58,.18)}
.wb-body{flex:1;min-width:0}
.wb-body h3{font-size:15.5px;color:var(--ink);margin-bottom:3px}
.wb-body p{font-size:13px;color:#7a6220;line-height:1.5}
.wb-btn{width:auto;flex:none}
@media (max-width:860px){.welcome-banner{flex-wrap:wrap}.wb-btn{width:100%}}

/* syllabus */
.module{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.module + .module{margin-top:12px}
.module-head{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;width:100%;text-align:left}
.module-head:hover{background:var(--surface-2)}
.module-ico{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:none;
  font-family:'Space Grotesk';font-weight:700;font-size:15px;color:#fff}
.module-head .mt{flex:1}
.module-head .mt h4{font-size:15px;color:var(--ink)}
.module-head .mt p{font-size:12.5px;color:var(--muted);margin-top:2px}
.chev{width:20px;height:20px;color:var(--muted-2);transition:transform .25s;flex:none}
.module.open .chev{transform:rotate(180deg)}
.module-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.module.open .module-body{max-height:600px}
.module-body ul{list-style:none;padding:4px 18px 18px 72px}
.module-body li{font-size:13.5px;color:var(--ink-2);padding:7px 0;border-bottom:1px dashed var(--line-2);
  display:flex;align-items:center;gap:9px}
.module-body li:last-child{border-bottom:none}
.module-body li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent-2);flex:none}

/* recordings */
.rec-group{margin-bottom:22px}
.rec-group > h3{font-size:14px;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:9px}
.rec-group > h3 .tag{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface-2);
  border:1px solid var(--line);padding:2px 9px;border-radius:20px}
.vid-card{display:flex;align-items:center;gap:14px;padding:13px 15px;background:var(--surface);
  border:1px solid var(--line);border-radius:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.vid-card + .vid-card{margin-top:9px}
.vid-card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(224,161,58,.12)}
.vid-thumb{width:52px;height:52px;border-radius:10px;background:var(--ink);display:grid;place-items:center;flex:none;position:relative}
.vid-thumb svg{width:22px;height:22px;color:var(--accent)}
.vid-info{flex:1;min-width:0}
.vid-info h4{font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vid-info p{font-size:12px;color:var(--muted);margin-top:2px}
.vid-dur{font-size:11.5px;color:var(--muted-2);font-family:'JetBrains Mono';flex:none}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(15,22,42,.72);z-index:50;
  align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex;animation:fade .2s}
.modal-box{background:var(--surface);border-radius:var(--radius);max-width:760px;width:100%;overflow:hidden;box-shadow:var(--shadow-lg)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:15px;color:var(--ink)}
.modal-close{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--muted)}
.modal-close:hover{background:var(--surface-2);color:var(--ink)}
.vid-frame{aspect-ratio:16/9;background:#000;display:grid;place-items:center;color:#8a94ab;text-align:center;padding:20px}
.vid-frame iframe{width:100%;height:100%;border:0}
.vid-frame .ph{font-size:13px;line-height:1.7}
.vid-frame .ph .mono{color:var(--accent);font-size:12px}

/* resources */
.res-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);
  border-radius:12px;background:var(--surface)}
.res-item + .res-item{margin-top:10px}
.res-ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none}
.res-ico svg{width:20px;height:20px}
.res-info{flex:1}
.res-info h4{font-size:14px;color:var(--ink)}
.res-info p{font-size:12px;color:var(--muted);margin-top:2px}
.res-dl{padding:8px 14px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);
  font-size:12.5px;font-weight:600;color:var(--ink-2);display:flex;align-items:center;gap:7px}
.res-dl:hover{border-color:var(--accent-2);color:var(--accent-2)}
.res-dl svg{width:15px;height:15px}

/* schedule */
.sched-row{display:flex;align-items:center;gap:16px;padding:15px 0;border-bottom:1px solid var(--line-2)}
.sched-row:last-child{border-bottom:none}
.sched-day{width:46px;text-align:center;flex:none}
.sched-day .d{font-family:'Space Grotesk';font-weight:700;font-size:16px;color:var(--ink)}
.sched-day .dd{font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em}
.sched-info{flex:1}
.sched-info h4{font-size:14px;color:var(--ink)}
.sched-info p{font-size:12.5px;color:var(--muted);margin-top:2px}
.sched-time{font-size:12.5px;font-family:'JetBrains Mono';color:var(--ink-2);font-weight:500;flex:none}
.meet-btn{padding:8px 13px;border-radius:9px;background:var(--good-soft);color:#1a7a4f;font-size:12.5px;font-weight:600;flex:none}
.meet-btn:hover{background:#d3eee0}

/* certificate */
.cert-wrap{display:flex;flex-direction:column;align-items:center}
.certificate{width:100%;max-width:640px;aspect-ratio:1.414/1;background:var(--surface);
  border:2px solid var(--ink);border-radius:8px;padding:34px;position:relative;
  box-shadow:var(--shadow-lg);display:flex;flex-direction:column}
.certificate::before{content:"";position:absolute;inset:9px;border:1px solid var(--accent);border-radius:4px;pointer-events:none}
.cert-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.cert-brand{display:flex;align-items:center;gap:10px}
.cert-seal{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--accent),#c58a26);
  display:grid;place-items:center;color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:10px;text-align:center;
  line-height:1.1;box-shadow:0 4px 12px rgba(197,138,38,.4);border:3px solid #fff;position:relative}
.cert-seal::after{content:"";position:absolute;inset:-6px;border:1.5px dashed var(--accent);border-radius:50%}
.cert-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;z-index:1}
.cert-mid .kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent-2);font-weight:600}
.cert-mid h2{font-family:'Space Grotesk';font-size:26px;color:var(--ink);margin:6px 0 20px}
.cert-mid .awarded{font-size:12px;color:var(--muted);letter-spacing:.05em}
.cert-name{font-family:'Space Grotesk';font-size:30px;font-weight:700;color:var(--ink);
  margin:8px 0 6px;padding:0 20px 10px;border-bottom:2px solid var(--accent);min-width:280px}
.cert-mid .desc{font-size:12.5px;color:var(--ink-2);max-width:400px;margin-top:14px;line-height:1.6}
.cert-mid .desc b{color:var(--ink)}
.cert-bot{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1;gap:16px}
.cert-sig{text-align:center}
.cert-sig .line{width:130px;border-top:1.5px solid var(--ink);margin-bottom:5px}
.cert-sig .role{font-size:11px;color:var(--muted)}
.cert-sig .nm{font-size:12.5px;font-weight:600;color:var(--ink);font-family:'Space Grotesk'}
.cert-qr{text-align:center}
.cert-qr img{width:74px;height:74px;border:1px solid var(--line);border-radius:6px;background:#fff;display:block}
.cert-qr .qr-fallback{width:74px;height:74px;border:1px solid var(--line);border-radius:6px;background:var(--surface-2);
  display:grid;place-items:center;font-size:9px;color:var(--muted-2);padding:6px;text-align:center;line-height:1.3}
.cert-qr .cid{font-size:9px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono'}
.cert-actions{display:flex;gap:12px;margin-top:22px}
.cert-actions .btn{width:auto;padding:11px 20px}

/* verify */
.verify-box{max-width:520px;margin:0 auto}
.verify-input{display:flex;gap:10px;margin-top:8px}
.verify-input input{flex:1;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--radius-sm);
  font-size:15px;font-family:'JetBrains Mono';letter-spacing:.02em;text-transform:uppercase;background:var(--surface-2)}
.verify-input input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
.verify-input .btn{width:auto;padding:13px 22px}
.verify-result{margin-top:20px;border-radius:var(--radius);padding:22px;display:none}
.verify-result.show{display:block;animation:fade .3s}
.verify-result.valid{background:var(--good-soft);border:1px solid #b9e5cf}
.verify-result.invalid{background:var(--bad-soft);border:1px solid #f0c9c9}
.vr-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.vr-badge{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex:none}
.vr-badge svg{width:24px;height:24px;color:#fff}
.valid .vr-badge{background:var(--good)}
.invalid .vr-badge{background:var(--bad)}
.vr-head h3{font-size:16px}
.valid .vr-head h3{color:#1a7a4f}
.invalid .vr-head h3{color:#a13333}
.vr-head p{font-size:12.5px;color:var(--muted)}
.vr-detail{display:grid;grid-template-columns:auto 1fr;gap:8px 18px;font-size:13.5px;padding-top:14px;border-top:1px solid rgba(0,0,0,.06)}
.vr-detail dt{color:var(--muted);font-weight:500}
.vr-detail dd{color:var(--ink);font-weight:600;text-align:right}

/* mobile bottom nav */
.mobile-nav{display:none}

@media (max-width:860px){
  .app.show{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:18px 16px 90px;max-width:100%}
  .topbar h1{font-size:20px}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
  .mobile-topbar{display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:var(--ink);color:#fff;position:sticky;top:0;z-index:20}
  .mobile-topbar .logo-row{margin:0}
  .mobile-topbar .brand-name{color:#fff;font-size:14px}
  .mobile-topbar .logo-mark{width:34px;height:34px}

<script src="data.js"></script>
<script>
/* ============================================================
   ENGINE
   ============================================================ */
let CURRENT = null;

async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function doLogin(){
  const id = document.getElementById("sid").value.trim().toUpperCase();
  const pw = document.getElementById("spw").value;
  const msg = document.getElementById("loginMsg");
  const s = STUDENTS[id];
  if(!s || !pw){ return showLoginErr("Enter a valid student ID and password."); }
  const hash = await sha256(pw);
  if(hash !== s.passHash){ return showLoginErr("Incorrect ID or password. Try again."); }
  msg.classList.remove("show");
  CURRENT = { id, ...s };
  enterApp();
}
function showLoginErr(t){
  const msg = document.getElementById("loginMsg");
  msg.textContent = t; msg.classList.add("show");
}
document.addEventListener("keydown",e=>{
  if(e.key==="Enter" && document.getElementById("authScreen").style.display!=="none"
     && document.getElementById("loginView").style.display!=="none") doLogin();
});

function doLogout(){
  CURRENT = null;
  document.getElementById("app").classList.remove("show");
  document.getElementById("authScreen").style.display="flex";
  document.getElementById("sid").value="";
  document.getElementById("spw").value="";
  showLoginView();
}

/* public verify (from login screen) */
function showVerifyPublic(){
  document.getElementById("loginView").style.display="none";
  document.getElementById("verifyView").style.display="block";
  document.getElementById("authTitle").textContent="Verify a certificate";
  document.getElementById("authDesc").textContent="Enter a certificate ID to confirm it was issued by Computech CEC.";
}
function showLoginView(){
  document.getElementById("verifyView").style.display="none";
  document.getElementById("loginView").style.display="block";
  document.getElementById("authTitle").textContent="Sign in";
  document.getElementById("authDesc").textContent="Enter the student ID and password shared by your instructor.";
  document.getElementById("pubResult").className="verify-result";
}
function findByCert(cid){
  cid = cid.trim().toUpperCase();
  for(const id in STUDENTS){
    const s = STUDENTS[id];
    if(s.certId.toUpperCase()===cid && s.certReady) return {id,...s};
  }
  return null;
}
function verifyPublic(){
  const cid = document.getElementById("pubCid").value;
  const box = document.getElementById("pubResult");
  const found = findByCert(cid);
  box.className = "verify-result show " + (found?"valid":"invalid");
  box.innerHTML = renderVerifyResult(found, cid);
}

function renderVerifyResult(found, cid){
  if(found){
    return `<div class="vr-head">
        <div class="vr-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg></div>
        <div><h3>Certificate verified</h3><p>Issued by Computech CEC</p></div>
      </div>
      <dl class="vr-detail">
        <dt>Name</dt><dd>${found.name}</dd>
        <dt>Course</dt><dd>${INSTITUTE.course}</dd>
        <dt>Certificate ID</dt><dd class="mono">${found.certId}</dd>
        <dt>Issued on</dt><dd>${found.certDate}</dd>
      </dl>`;
  }
  return `<div class="vr-head">
      <div class="vr-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg></div>
      <div><h3>Not found</h3><p>No valid certificate matches <span class="mono">${cid||"—"}</span></p></div>
    </div>`;
}

/* ---- nav config ---- */
const TABS = [
  { id:"home",    label:"Home",        icon:'<path d="M3 12l9-9 9 9M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/>' },
  { id:"syllabus",label:"Syllabus",    icon:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/>' },
  { id:"videos",  label:"Recordings",  icon:'<rect x="2" y="4" width="20" height="16" rx="2.5"/><path d="M10 9l5 3-5 3z"/>' },
  { id:"resources",label:"Resources",  icon:'<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM13 2v7h7"/>' },
  { id:"schedule",label:"Schedule",    icon:'<rect x="3" y="4" width="18" height="18" rx="2.5"/><path d="M16 2v4M8 2v4M3 10h18"/>' },
  { id:"certificate",label:"Certificate",icon:'<circle cx="12" cy="9" r="6"/><path d="M8.5 14 7 22l5-3 5 3-1.5-8"/>' }
];

function enterApp(){
  document.getElementById("authScreen").style.display="none";
  document.getElementById("app").classList.add("show");
  document.getElementById("sideName").textContent = CURRENT.name;
  document.getElementById("sideBatch").textContent = CURRENT.batch;
  document.getElementById("sideAvatar").textContent = CURRENT.name[0];
  buildNav(); buildPanels(); goTab("home");
  window.scrollTo(0,0);
}

function buildNav(){
  const dn = document.getElementById("deskNav");
  const mn = document.getElementById("mobileNav");
  dn.innerHTML=""; mn.innerHTML="";
  TABS.forEach(t=>{
    dn.insertAdjacentHTML("beforeend",
      `<button class="nav-item" data-tab="${t.id}" onclick="goTab('${t.id}')">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${t.icon}</svg>${t.label}</button>`);
    mn.insertAdjacentHTML("beforeend",
      `<button class="mnav-item" data-tab="${t.id}" onclick="goTab('${t.id}')">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${t.icon}</svg>${t.label}</button>`);
  });
}

function goTab(id){
  document.querySelectorAll(".tab-panel").forEach(p=>p.classList.toggle("show",p.dataset.tab===id));
  document.querySelectorAll(".nav-item,.mnav-item").forEach(n=>n.classList.toggle("active",n.dataset.tab===id));
  window.scrollTo(0,0);
}

function buildPanels(){
  document.getElementById("panels").innerHTML =
    panelHome()+panelSyllabus()+panelVideos()+panelResources()+panelSchedule()+panelCertificate();
  // init QR after render
  loadCertQR();
}

/* ---- HOME ---- */

      </div>
    </div>
  </section>`;
}

      <div class="rec-group">

        ${g.items.map((v,idx)=>`

            <div class="vid-dur">${v.dur}</div>
          </button>`).join("")}
      </div>`).join("")}

}
function openVid(title, fileId){
  document.getElementById("vidTitle").textContent = title;
  const frame = document.getElementById("vidFrame");
  if(fileId){
    frame.innerHTML = `<iframe src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" allowfullscreen></iframe>`;
  }else{
    frame.innerHTML = `<div class="ph">This recording isn't linked yet.<br>
      Instructor: paste the Drive file ID into <span class="mono">RECORDINGS</span> to enable playback.</div>`;

  document.getElementById("vidModal").classList.add("show");
}
function closeVid(){
  document.getElementById("vidModal").classList.remove("show");
  document.getElementById("vidFrame").innerHTML="";
}

/* ---- RESOURCES ---- */

    pdf:{bg:"#fae6e6",fg:"#d64545",p:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>'},
    xlsx:{bg:"#e2f4ec",fg:"#22a06b",p:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13l3 5M11 13l-3 5"/>'},

/* ---- CERTIFICATE ---- */
function panelCertificate(){
  if(!CURRENT.certReady){
    return `<section class="tab-panel" data-tab="certificate">
      <div class="topbar"><div><h1>Certificate</h1></div></div>
      <div class="card" style="text-align:center;padding:48px 24px">

        <p style="color:var(--muted);font-size:13.5px;max-width:340px;margin:0 auto">Finish the course to unlock your certificate. You're at <b style="color:var(--ink)">${CURRENT.progress}%</b> — keep going!</p>

  return `<section class="tab-panel" data-tab="certificate">

          </div>
          <div class="cert-seal">ISO<br>CERTIFIED</div>
        </div>
        <div class="cert-mid">
          <div class="kicker">Certificate of Completion</div>
          <div class="awarded" style="margin-top:14px">This is proudly awarded to</div>
          <div class="cert-name">${CURRENT.name}</div>
          <div class="desc">for successfully completing the <b>${INSTITUTE.course}</b> program covering Excel, SQL, Power BI, Tableau &amp; AI Tools.</div>
        </div>
        <div class="cert-bot">
          <div class="cert-sig"><div class="line"></div><div class="nm">${INSTITUTE.director}</div><div class="role">Director, ${INSTITUTE.name}</div></div>
          <div class="cert-qr">
            <img id="certQR" alt="Verification QR" onerror="qrFallback()">
            <div class="qr-fallback" id="qrFB" style="display:none">Scan to verify<br>${CURRENT.certId}</div>
            <div class="cid">${CURRENT.certId}</div>
          </div>
          <div class="cert-sig"><div class="line"></div><div class="role">Date</div><div class="nm">${CURRENT.certDate}</div></div>
        </div>
      </div>
      <div class="cert-actions">
        <button class="btn btn-primary" onclick="printCert()">Download / Print</button>
        <button class="btn btn-ghost" onclick="goTab('home')">Back to home</button>
      </div>
    </div>
  </section>`;
}
function loadCertQR(){
  const img = document.getElementById("certQR");
  if(!img) return;
  // Encodes the verification target. Replace the base URL with your GitHub Pages URL.
  const base = (INSTITUTE.verifyBase||"").replace(/\/$/,"");
  const verifyUrl = base + "/?verify="+encodeURIComponent(CURRENT.certId);
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&margin=0&data="+encodeURIComponent(verifyUrl);
}
function qrFallback(){
  const img=document.getElementById("certQR"), fb=document.getElementById("qrFB");
  if(img) img.style.display="none";
  if(fb) fb.style.display="grid";
}
function printCert(){
  const card = document.getElementById("certCard").outerHTML;
  const w = window.open("","_blank");
  w.document.write(`<html><head><title>${CURRENT.name} — Certificate</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>body{margin:0;padding:24px;font-family:Inter}${document.querySelector("style").innerHTML}
    .certificate{box-shadow:none;margin:0 auto}@media print{body{padding:0}}</style></head>
    <body>${card}<script>window.onload=()=>setTimeout(()=>window.print(),400)<\/script></body></html>`);
  w.document.close();
}

/* deep-link: ?verify=CEC-BA-... opens public verify */
window.addEventListener("load",()=>{
  const p = new URLSearchParams(location.search).get("verify");
  if(p){ showVerifyPublic(); document.getElementById("pubCid").value=p; verifyPublic(); }
});
</script>
